# Render Blueprint — one-click deploy for the backend.
# After you click "Deploy to Render", you'll be asked to fill in the env vars
# marked `sync: false`. See DEPLOY.md for exactly what to paste.

services:
  - type: web
    name: codebase-explainer-backend
    runtime: docker
    plan: free
    region: frankfurt
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: NEO4J_DATABASE
        value: neo4j
      - key: FRONTEND_ORIGIN
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: MAX_REPO_FILES
        value: "300"
      - key: MAX_FILE_BYTES
        value: "100000"
      - key: ALLOWED_EXTENSIONS
        value: py,ts,tsx,js,jsx,mjs
